plugins:
  - rubocop-performance
  - rubocop-rails
  - rubocop-rbs_inline
  - rubocop-rspec
  - rubocop-rspec_rails
  - rubocop-thread_safety

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - bin/**/*

Layout/LeadingCommentSpace:
  Enabled: true
  AllowDoxygenCommentStyle: false
  AllowGemfileRubyComment: false
  AllowRBSInlineAnnotation: true

Layout/LineLength:
  Enabled: true
  Max: 120
  AllowHeredoc: true
  AllowURI: true
  AllowQualifiedName: true
  AllowRBSInlineAnnotation: true
  AllowCopDirectives: true
  AllowedPatterns:
    - "^ *#"

Metrics/BlockLength:
  Enabled: true
  CountComments: false
  Max: 25
  CountAsOne:
    - array
    - hash
    - heredoc

Metrics/ClassLength:
  Enabled: true
  CountComments: false
  Max: 100
  CountAsOne:
    - array
    - hash
    - heredoc
  Exclude:
    - spec/support/solid_queue_helper.rb

Metrics/MethodLength:
  Enabled: true
  CountComments: false
  Max: 10
  CountAsOne:
    - array
    - hash
    - heredoc

Metrics/ModuleLength:
  Enabled: true
  CountComments: false
  Max: 100
  CountAsOne:
    - array
    - hash
    - heredoc
  Exclude:
    - spec/support/solid_queue_helper.rb

RSpec/ExampleLength:
  Enabled: true
  Max: 5
  CountAsOne:
    - array
    - hash
    - heredoc

RSpec/DescribeClass:
  Exclude:
    - spec/jobs/acceptance_job_coverage_spec.rb
    - spec/jobs/conditional_execution_spec.rb
    - spec/jobs/dependency_wait_spec.rb
    - spec/jobs/dry_run_spec.rb
    - spec/jobs/dsl_basics_spec.rb
    - spec/jobs/error_handling_spec.rb
    - spec/jobs/lifecycle_hooks_spec.rb
    - spec/jobs/parallel_processing_spec.rb
    - spec/jobs/queue_management_spec.rb
    - spec/jobs/task_outputs_spec.rb
    - spec/jobs/workflow_composition_spec.rb
    - spec/jobs/workflow_status_query_spec.rb

RSpec/AroundBlock:
  Exclude:
    - spec/jobs/lifecycle_hooks_spec.rb

Naming/PredicateMethod:
  Exclude:
    - spec/support/solid_queue_helper.rb

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

ThreadSafety/ClassAndModuleAttributes:
  Enabled: false
